# Netlify: https://docs.netlify.com/configure-builds/file-based-configuration/
# 저장소: https://github.com/kis1000burn-netizen/nurion
#
# Netlify 대시보드: Base directory = 비움(저장소 루트). 여기만 쓰면 publish = netlify 가 적용됩니다.

[build]
  command = "npm ci && npm run build:netlify"
  publish = "netlify"

[build.environment]
  NODE_VERSION = "20"

# 정적 다중 페이지(index, mobile-lobby, dept/*.html)만 사용. SPA식 /* → index.html 리라이트는
# mobile-lobby.html 요청까지 index(3D 번들)로 덮어쓰는 사고를 유발하므로 두지 않음.

# GLB 교체 후에도 CDN/브라우저가 옛 URL을 오래 붙잡지 않도록 (?v= 와 함께 사용)
[[headers]]
  for = "/assets/*.glb"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
