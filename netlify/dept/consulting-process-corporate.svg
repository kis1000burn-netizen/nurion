<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#09111b"/>
      <stop offset="100%" stop-color="#10253d"/>
    </linearGradient>
    <radialGradient id="rg1" cx="15%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#1dc4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1dc4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rg2" cx="80%" cy="22%" r="45%">
      <stop offset="0%" stop-color="#89e7ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#89e7ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#rg1)"/>
  <rect width="1600" height="1000" fill="url(#rg2)"/>

  <text x="120" y="138" fill="#e8f6ff" font-size="50" font-family="Pretendard, Noto Sans KR, sans-serif" font-weight="800">기업컨설팅 프로세스</text>
  <text x="120" y="238" fill="#b8dce8" font-size="26" font-family="Pretendard, Noto Sans KR, sans-serif" font-weight="600">진단 → 설계 → 실행 → 정착까지 단계별로 연결되는 실행형 구조</text>

  <g filter="url(#shadow)">
    <rect x="110" y="300" width="310" height="480" rx="30" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <rect x="450" y="300" width="310" height="480" rx="30" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <rect x="790" y="300" width="310" height="480" rx="30" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <rect x="1130" y="300" width="310" height="480" rx="30" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
  </g>

  <!-- arrows -->
  <g stroke="#49d2ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M425 540 H450"/>
    <path d="M765 540 H790"/>
    <path d="M1105 540 H1130"/>
    <path d="M438 525 l20 15 -20 15"/>
    <path d="M778 525 l20 15 -20 15"/>
    <path d="M1118 525 l20 15 -20 15"/>
  </g>

  <!-- step 1 -->
  <g font-family="Pretendard, Noto Sans KR, sans-serif">
    <circle cx="180" cy="380" r="34" fill="#17c6ff"/>
    <text x="167" y="390" fill="#03111a" font-size="30" font-weight="900">1</text>
    <text x="160" y="450" fill="#f0fbff" font-size="33" font-weight="800">진단</text>
    <text x="160" y="497" fill="#c5e4ef" font-size="22" font-weight="600">현황 인터뷰 · 자료 검토</text>
    <text x="160" y="547" fill="#eaf6fc" font-size="22" font-weight="500">핵심 문제와 기회를 정리하고</text>
    <text x="160" y="582" fill="#eaf6fc" font-size="22" font-weight="500">대표가 바로 볼 수 있는</text>
    <text x="160" y="617" fill="#eaf6fc" font-size="22" font-weight="500">우선순위 프레임을 만듭니다.</text>
    <rect x="160" y="660" width="200" height="12" rx="6" fill="#1fc6ff"/>
    <rect x="160" y="685" width="150" height="12" rx="6" fill="rgba(255,255,255,0.25)"/>
  </g>

  <!-- step 2 -->
  <g font-family="Pretendard, Noto Sans KR, sans-serif">
    <circle cx="520" cy="380" r="34" fill="#17c6ff"/>
    <text x="507" y="390" fill="#03111a" font-size="30" font-weight="900">2</text>
    <text x="500" y="450" fill="#f0fbff" font-size="33" font-weight="800">설계</text>
    <text x="500" y="497" fill="#c5e4ef" font-size="22" font-weight="600">전략 · 재무 · 조직 구조화</text>
    <text x="500" y="547" fill="#eaf6fc" font-size="22" font-weight="500">목표, 수익모델, 역할 체계,</text>
    <text x="500" y="582" fill="#eaf6fc" font-size="22" font-weight="500">정책자금·제안서 흐름까지</text>
    <text x="500" y="617" fill="#eaf6fc" font-size="22" font-weight="500">실행 가능한 구조로 설계합니다.</text>
    <rect x="500" y="660" width="210" height="12" rx="6" fill="#1fc6ff"/>
    <rect x="500" y="685" width="170" height="12" rx="6" fill="rgba(255,255,255,0.25)"/>
  </g>

  <!-- step 3 -->
  <g font-family="Pretendard, Noto Sans KR, sans-serif">
    <circle cx="860" cy="380" r="34" fill="#17c6ff"/>
    <text x="847" y="390" fill="#03111a" font-size="30" font-weight="900">3</text>
    <text x="840" y="450" fill="#f0fbff" font-size="33" font-weight="800">실행</text>
    <text x="840" y="497" fill="#c5e4ef" font-size="22" font-weight="600">90일 로드맵 · 마일스톤 관리</text>
    <text x="840" y="547" fill="#eaf6fc" font-size="22" font-weight="500">누가, 언제, 무엇을 할지</text>
    <text x="840" y="582" fill="#eaf6fc" font-size="22" font-weight="500">일정과 체크포인트를 명확히 해</text>
    <text x="840" y="617" fill="#eaf6fc" font-size="22" font-weight="500">실행 지연을 줄입니다.</text>
    <rect x="840" y="660" width="220" height="12" rx="6" fill="#1fc6ff"/>
    <rect x="840" y="685" width="160" height="12" rx="6" fill="rgba(255,255,255,0.25)"/>
  </g>

  <!-- step 4 -->
  <g font-family="Pretendard, Noto Sans KR, sans-serif">
    <circle cx="1200" cy="380" r="34" fill="#17c6ff"/>
    <text x="1187" y="390" fill="#03111a" font-size="30" font-weight="900">4</text>
    <text x="1180" y="450" fill="#f0fbff" font-size="33" font-weight="800">정착</text>
    <text x="1180" y="497" fill="#c5e4ef" font-size="22" font-weight="600">성과 지표 · 반복 개선</text>
    <text x="1180" y="547" fill="#eaf6fc" font-size="22" font-weight="500">진단과 실행 결과를 문서화해</text>
    <text x="1180" y="582" fill="#eaf6fc" font-size="22" font-weight="500">이후에도 활용 가능한</text>
    <text x="1180" y="617" fill="#eaf6fc" font-size="22" font-weight="500">운영 기준으로 남깁니다.</text>
    <rect x="1180" y="660" width="200" height="12" rx="6" fill="#1fc6ff"/>
    <rect x="1180" y="685" width="145" height="12" rx="6" fill="rgba(255,255,255,0.25)"/>
  </g>
</svg>