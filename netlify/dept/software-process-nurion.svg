<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071017"/>
      <stop offset="1" stop-color="#0D201A"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#11212A"/>
      <stop offset="1" stop-color="#0A151C"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D28A"/>
      <stop offset="1" stop-color="#73FFD5"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <text x="86" y="118" fill="#FFFFFF" font-size="64" font-weight="700" font-family="Pretendard, Arial, sans-serif">구축 진행 흐름</text>
  <text x="88" y="208" fill="#C5EBE0" font-size="28" font-family="Pretendard, Arial, sans-serif">정의 → 설계 → 개발 → 운영 확장</text>

  <g transform="translate(80 308)">
    <rect x="0" y="0" width="300" height="460" rx="30" fill="url(#panel)" stroke="#2DE6A8" stroke-opacity="0.24"/>
    <circle cx="64" cy="70" r="26" fill="url(#green)"/>
    <text x="112" y="82" fill="#FFFFFF" font-size="34" font-weight="700" font-family="Pretendard, Arial, sans-serif">1. 정의</text>
    <text x="34" y="148" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 구축 유형 확인</text>
    <text x="34" y="190" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 사업 목적 정리</text>
    <text x="34" y="232" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 기능 우선순위 선정</text>
    <text x="34" y="274" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 참고 사이트 분석</text>
  </g>

  <g transform="translate(430 308)">
    <rect x="0" y="0" width="300" height="460" rx="30" fill="url(#panel)" stroke="#2DE6A8" stroke-opacity="0.24"/>
    <circle cx="64" cy="70" r="26" fill="url(#green)"/>
    <text x="112" y="82" fill="#FFFFFF" font-size="34" font-weight="700" font-family="Pretendard, Arial, sans-serif">2. 설계</text>
    <text x="34" y="148" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 화면 구조 설계</text>
    <text x="34" y="190" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 데이터/권한 구조</text>
    <text x="34" y="232" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 운영 동선 정의</text>
    <text x="34" y="274" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 문서/콘텐츠 구조화</text>
  </g>

  <g transform="translate(780 308)">
    <rect x="0" y="0" width="300" height="460" rx="30" fill="url(#panel)" stroke="#2DE6A8" stroke-opacity="0.24"/>
    <circle cx="64" cy="70" r="26" fill="url(#green)"/>
    <text x="112" y="82" fill="#FFFFFF" font-size="34" font-weight="700" font-family="Pretendard, Arial, sans-serif">3. 개발</text>
    <text x="34" y="148" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 홈페이지/시스템 구현</text>
    <text x="34" y="190" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• Add-on 기능 연결</text>
    <text x="34" y="232" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 테스트/품질 점검</text>
    <text x="34" y="274" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 관리자 기능 검수</text>
  </g>

  <g transform="translate(1130 308)">
    <rect x="0" y="0" width="300" height="460" rx="30" fill="url(#panel)" stroke="#2DE6A8" stroke-opacity="0.24"/>
    <circle cx="64" cy="70" r="26" fill="url(#green)"/>
    <text x="112" y="82" fill="#FFFFFF" font-size="34" font-weight="700" font-family="Pretendard, Arial, sans-serif">4. 운영</text>
    <text x="34" y="148" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 배포/모니터링</text>
    <text x="34" y="190" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 광고/콘텐츠 운영</text>
    <text x="34" y="232" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 기능 확장</text>
    <text x="34" y="274" fill="#D5F2EA" font-size="24" font-family="Pretendard, Arial, sans-serif">• 장기 유지관리</text>
  </g>

  <path d="M380 538H430" stroke="#49F0B9" stroke-width="8" stroke-linecap="round"/>
  <path d="M730 538H780" stroke="#49F0B9" stroke-width="8" stroke-linecap="round"/>
  <path d="M1080 538H1130" stroke="#49F0B9" stroke-width="8" stroke-linecap="round"/>
  <polygon points="418,538 390,522 390,554" fill="#49F0B9"/>
  <polygon points="768,538 740,522 740,554" fill="#49F0B9"/>
  <polygon points="1118,538 1090,522 1090,554" fill="#49F0B9"/>
</svg>
