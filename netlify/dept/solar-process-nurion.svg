  </text>

  <line x1="270" y1="470" x2="1330" y2="470" stroke="rgba(255,255,255,0.18)" stroke-width="6" stroke-linecap="round"/>

  <g>
    <circle cx="280" cy="470" r="70" fill="#241B11" stroke="rgba(255,255,255,0.12)"/>
    <text x="247" y="455" fill="#FFF3E0" font-size="26" font-family="Pretendard, Arial, sans-serif" font-weight="800">1</text>
    <text x="220" y="505" fill="#FFF3E0" font-size="28" font-family="Pretendard, Arial, sans-serif" font-weight="700">진단</text>
    <rect x="150" y="580" width="260" height="150" rx="24" fill="#1A1713" stroke="rgba(255,255,255,0.10)"/>
    <text x="185" y="635" fill="#FFF6E8" font-size="24" font-family="Pretendard, Arial, sans-serif" font-weight="700">사업 유형 점검</text>
    <text x="185" y="675" fill="#D9C6A1" font-size="19" font-family="Pretendard, Arial, sans-serif">부지 · 구조 · 주민참여 검토</text>
  </g>

  <g>
    <circle cx="620" cy="470" r="70" fill="#241B11" stroke="rgba(255,255,255,0.12)"/>
    <text x="587" y="455" fill="#FFF3E0" font-size="26" font-family="Pretendard, Arial, sans-serif" font-weight="800">2</text>
    <text x="545" y="505" fill="#FFF3E0" font-size="28" font-family="Pretendard, Arial, sans-serif" font-weight="700">구조 설계</text>
    <rect x="490" y="580" width="260" height="150" rx="24" fill="#1A1713" stroke="rgba(255,255,255,0.10)"/>
    <text x="525" y="635" fill="#FFF6E8" font-size="24" font-family="Pretendard, Arial, sans-serif" font-weight="700">참여 구조 설계</text>
    <text x="525" y="675" fill="#D9C6A1" font-size="19" font-family="Pretendard, Arial, sans-serif">RE100 · 조합 · 운영 방향</text>
  </g>

  <g>
    <circle cx="960" cy="470" r="70" fill="#241B11" stroke="rgba(255,255,255,0.12)"/>
    <text x="927" y="455" fill="#FFF3E0" font-size="26" font-family="Pretendard, Arial, sans-serif" font-weight="800">3</text>
    <text x="885" y="505" fill="#FFF3E0" font-size="28" font-family="Pretendard, Arial, sans-serif" font-weight="700">문서 정리</text>
    <rect x="830" y="580" width="260" height="150" rx="24" fill="#1A1713" stroke="rgba(255,255,255,0.10)"/>
    <text x="865" y="635" fill="#FFF6E8" font-size="24" font-family="Pretendard, Arial, sans-serif" font-weight="700">정관 · 총회 · PM</text>
