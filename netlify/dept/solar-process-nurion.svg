  </g>

  <g>
    <circle cx="1300" cy="470" r="70" fill="#241B11" stroke="rgba(255,255,255,0.12)"/>
    <text x="1267" y="455" fill="#FFF3E0" font-size="26" font-family="Pretendard, Arial, sans-serif" font-weight="800">4</text>
    <text x="1212" y="505" fill="#FFF3E0" font-size="28" font-family="Pretendard, Arial, sans-serif" font-weight="700">실행 지원</text>
    <rect x="1170" y="580" width="260" height="150" rx="24" fill="#1A1713" stroke="rgba(255,255,255,0.10)"/>
    <text x="1205" y="635" fill="#FFF6E8" font-size="24" font-family="Pretendard, Arial, sans-serif" font-weight="700">후속 대관·보완</text>
    <text x="1205" y="675" fill="#D9C6A1" font-size="19" font-family="Pretendard, Arial, sans-serif">운영 정착 · 협업 지원</text>
  </g>

  <rect x="175" y="268" width="1220" height="90" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
  <text x="235" y="323" fill="#FFF2DF" font-size="26" font-family="Pretendard, Arial, sans-serif" font-weight="700">
