  </text>

  <defs>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 180) rotate(90) scale(220)">
      <stop stop-color="#FF9F1A" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#FF9F1A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1370 760) rotate(90) scale(260)">
      <stop stop-color="#FFC66B" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFC66B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1118"/>
      <stop offset="1" stop-color="#121821"/>
    </linearGradient>
  </defs>
</svg>
