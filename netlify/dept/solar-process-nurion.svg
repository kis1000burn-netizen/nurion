<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#0C1016"/>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="240" cy="180" r="220" fill="url(#glow1)"/>
  <circle cx="1370" cy="760" r="260" fill="url(#glow2)"/>

  <text x="120" y="132" fill="#F8F1E5" font-size="52" font-family="Pretendard, Arial, sans-serif" font-weight="800">
    NURION SOLAR PROCESS
  </text>
  <text x="120" y="222" fill="#D9C8A7" font-size="28" font-family="Pretendard, Arial, sans-serif">
